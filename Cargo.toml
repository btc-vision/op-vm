[package]
name = "op-vm"
version = "0.3.13"
edition = "2021"
exclude = ["index.node"]

[lib]
crate-type = ["cdylib"]

[dependencies]
wasmer = "5.0.4"
wasmer-compiler-singlepass = "5.0.4"
wasmer-middlewares = "5.0.4"
wasmer-types = "5.0.4"
wasmer-compiler = "5.0.4"
anyhow = "1.0.97"
tokio = "1.44.2"
chrono = "0.4.40"
sha2 = "0.10.8"
ripemd = "0.1.3"
hex = "0.4.3"
bytes = "1.10.1"
bitcoin = "0.32.5"
log = "0.4.27"
secp256k1 = { version = "0.30.0", features = ["std"] }
once_cell = "1.21.3"
thiserror = "2.0.12"
num_cpus = "1.16.0"

[dependencies.neon]
version = "1.1.0-alpha.1"
features = ["napi-latest", "tokio-rt-multi-thread", "tokio-rt", "tokio", "doc-comment"]

[profile.release]
lto = true
strip = "symbols"
